name: CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      OAPI_CODEGEN_VERSION: v2.6.0
      SQLC_VERSION: v1.30.0
      GOOSE_VERSION: v3.27.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Cache Go tool binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ env.OAPI_CODEGEN_VERSION }}-${{ env.SQLC_VERSION }}-${{ env.GOOSE_VERSION }}

      - name: Bootstrap tools
        run: just bootstrap

      - name: Generate and check clean git state
        run: |
          just generate
          git diff --exit-code

      - name: Lint
        run: just lint

      - name: Unit tests
        run: just test

      - name: Build
        run: just build
