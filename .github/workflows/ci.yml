name: CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      OAPI_CODEGEN_VERSION: v2.6.0
      SQLC_VERSION: v1.30.0
      GOOSE_VERSION: v3.27.0
      STATICCHECK_VERSION: v0.7.0
      GOVULNCHECK_VERSION: v1.1.4
      JUST_VERSION: 1.48.0
      JUST_LINUX_X86_64_SHA256: a62e100de2922519ff3d6128f580837b4c0e197aa61a6fb448f43e50e7dd9b9b
      PROJ_APT_PACKAGES: pkg-config libproj-dev proj-data
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        run: |
          curl -fsSLo just.tar.gz "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          echo "${JUST_LINUX_X86_64_SHA256}  just.tar.gz" | sha256sum --check
          tar -xzf just.tar.gz just
          install -m 0755 just "$HOME/.local/bin/just"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install PROJ build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $PROJ_APT_PACKAGES

      - name: Cache Go tool binaries
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ env.OAPI_CODEGEN_VERSION }}-${{ env.SQLC_VERSION }}-${{ env.GOOSE_VERSION }}-${{ env.STATICCHECK_VERSION }}-${{ env.GOVULNCHECK_VERSION }}

      - name: Bootstrap tools
        run: just bootstrap

      - name: Generate and check clean git state
        run: |
          just generate
          git diff --exit-code

      - name: Lint
        run: just lint

      - name: Unit tests
        run: just test

      - name: Race tests
        run: just test-race

      - name: Build
        run: just build
