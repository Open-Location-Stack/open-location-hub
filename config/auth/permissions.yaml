admin@example.com:
  description: Full administrative access for local Dex development and tests.
  /v2/*:
    - CREATE_ANY
    - READ_ANY
    - UPDATE_ANY
    - DELETE_ANY
  rpc:
    discover: true
    invoke:
      "*": true
  websocket:
    subscribe:
      "*": true
    publish:
      location_updates: true
      proximity_updates: true

reader@example.com:
  description: Read-only role used to prove authorization failures in tests.
  /v2/zones:
    - READ_ANY
  /v2/zones/:zoneId:
    - READ_ANY
  /v2/rpc/available:
    - READ_ANY
  rpc:
    discover: true
    invoke:
      com.omlox.ping: true
      com.omlox.identify: true
  websocket:
    subscribe:
      location_*: true
      fence_events*: true
      metadata_changes: true
      trackable_motions: true
    publish: {}

owner@example.com:
  description: Ownership-restricted role used to prove OWN authorization failures.
  /v2/providers/:providerId:
    - READ_OWN
  websocket:
    subscribe: {}
    publish: {}
