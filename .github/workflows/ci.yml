name: CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      OAPI_CODEGEN_VERSION: v2.6.0
      SQLC_VERSION: v1.30.0
      GOOSE_VERSION: v3.27.0
      PROJ_APT_PACKAGES: pkg-config libproj-dev proj-data
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Cache apt package archives
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-proj-${{ env.PROJ_APT_PACKAGES }}

      - name: Install PROJ build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $PROJ_APT_PACKAGES

      - name: Cache Go tool binaries
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ env.OAPI_CODEGEN_VERSION }}-${{ env.SQLC_VERSION }}-${{ env.GOOSE_VERSION }}

      - name: Bootstrap tools
        run: just bootstrap

      - name: Generate and check clean git state
        run: |
          just generate
          git diff --exit-code

      - name: Lint
        run: just lint

      - name: Unit tests
        run: just test

      - name: Build
        run: just build
